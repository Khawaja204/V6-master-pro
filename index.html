<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <title>ADEEL'S V6 MASTER PRO</title>
    <style>
        :root { --bg: #0b0e14; --col: #181c22; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 15px; }
        .dashboard { display: grid; grid-template-columns: 200px 1fr 1fr; gap: 15px; }
        .sidebar { background: var(--col); padding: 15px; border-radius: 8px; }
        #sentiment-box { margin-top: 20px; padding: 10px; background: #2a2e36; border-radius: 5px; text-align: center; }
        .column { background: var(--col); padding: 15px; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: center; border: 1px solid #333; font-size: 11px; }
        .liq-hunter { background-color: #0b2e1f !important; color: #00ff00 !important; }
        .stuck-highlight { background-color: #8b8b00 !important; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h3>Folders</h3>
            <button onclick="setFilter('ALL')">ALL</button>
            <button onclick="setFilter('PUMP')">PUMP</button>
            <button onclick="setFilter('STUCK')">STUCK</button>
            <div id="sentiment-box">Sentiment: <span id="sent">...</span></div>
        </div>
        <div class="column">
            <h2>VMC FOLDER</h2>
            <table>
                <thead><tr><th>Time</th><th>Asset</th><th>Signal</th><th>VMC</th><th>Price (Sci)</th><th>Stuck</th></tr></thead>
                <tbody id="vmc-body"></tbody>
            </table>
        </div>
        <div class="column">
            <h2>WHALE WALLET</h2>
            <table>
                <thead><tr><th>Asset</th><th>Flow</th><th>Conc%</th><th>BigTicket</th><th>Price</th></tr></thead>
                <tbody id="whale-body"></tbody>
            </table>
        </div>
    </div>
    <script>
        let currentFilter = 'ALL';
        // Automatic URL detection
        const BACKEND_URL = window.location.origin + '/get-data';

        async function updateData() {
            try {
                const res = await fetch(BACKEND_URL);
                const data = await res.json();
                
                document.getElementById('sent').innerText = data.sentiment;
                const vmcBody = document.getElementById('vmc-body');
                vmcBody.innerHTML = '';
                
                const filtered = currentFilter === 'ALL' ? data.vmc_list : data.vmc_list.filter(r => r.folder === currentFilter);
                
                filtered.forEach(row => {
                    let tr = document.createElement('tr');
                    if(row.vmc >= 100) tr.classList.add('liq-hunter');
                    // 'signal' property agar data mein na ho to 'N/A' show karega
                    tr.innerHTML = `<td>${row.time}</td><td>${row.asset}</td><td>${row.signal || 'N/A'}</td><td>${row.vmc}</td><td>${row.price}</td><td>${row.stuck}</td>`;
                    vmcBody.appendChild(tr);
                });
            } catch(e) { console.error("Error fetching data:", e); }
        }
        
        function setFilter(f) { currentFilter = f; updateData(); }
        setInterval(updateData, 1000);
    </script>
</body>
</html>
