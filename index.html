<!DOCTYPE html>
<html>
<head><title>V6 Elite Terminal</title>
<style>
    body { background: #050505; color: #00ff00; font-family: monospace; }
    .login-box { text-align: center; margin-top: 100px; }
    input { padding: 10px; margin: 5px; background: #111; color: #0f0; border: 1px solid #333; }
    .table-container { overflow-x: auto; display: none; padding: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #333; padding: 12px; text-align: center; }
    .buy { color: #00ff00; font-weight: bold; }
    .sell { color: #ff0000; font-weight: bold; }
    .close { color: #00ff00; font-weight: bold; } 
    .far { color: #ff9900; font-weight: bold; }
</style>
</head>
<body>
    <div id="login-section" class="login-box">
        <h1>🐋 V6 Elite Login</h1>
        <input id="uid" placeholder="UserID"><br>
        <input id="upass" type="password" placeholder="Password"><br>
        <button onclick="checkLogin()">Enter Terminal</button>
    </div>
    <div id="dashboard" class="table-container">
        <h1>🐋 V6 Elite-Sniper Live Dashboard</h1>
        <table>
            <tr style="background:#111;">
                <th>Time</th><th>Whale ID</th><th>Coin</th><th>Action</th><th>Spoof</th>
                <th>Avg</th><th>Impact</th><th>Zone</th><th>Sig</th><th>Price (%)</th><th>PRO ACTION</th>
            </tr>
            <tbody id="terminal"></tbody>
        </table>
    </div>
    <script>
        async function checkLogin() {
            let id = document.getElementById('uid').value;
            let pass = document.getElementById('upass').value;
            
            let formData = new URLSearchParams();
            formData.append('id', id);
            formData.append('pass', pass);

            let res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: formData
            });
            
            let text = await res.text();
            if(text === "ACTIVE") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
                setInterval(loadData, 3000);
            } else { alert("Access Denied!"); }
        }

        async function loadData() {
            let res = await (await fetch('/api/v6_data', {method:'POST'})).json();
            let html = '';
            const BASE_PRICE = 2.45;
            
            if (res.whales) {
                res.whales.forEach(r => {
                    let currentPrice = parseFloat(r[9]);
                    let diff = ((currentPrice - BASE_PRICE) / BASE_PRICE * 100).toFixed(2);
                    let colorClass = Math.abs(diff) > 2 ? 'far' : 'close'; 
                    html += `<tr>
                        <td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td>
                        <td class="${r[3]=='ACCUMULATING'?'buy':'sell'}">${r[3]}</td>
                        <td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td>${r[8]}</td>
                        <td class="${colorClass}">${currentPrice}<br><small>(${diff}%)</small></td>
                        <td style="background:#222; color:yellow;">${r[10]}</td>
                    </tr>`;
                });
            }
            document.getElementById('terminal').innerHTML = html;
        }
    </script>
</body>
</html>
