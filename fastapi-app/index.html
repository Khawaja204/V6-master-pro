<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastAPI App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            display: inline-block;
            text-align: left;
            min-width: 300px;
        }

        .card h2 {
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
            margin-bottom: 0.75rem;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            color: #4ade80;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .api-link {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.6rem 1.25rem;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .api-link:hover {
            background: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FastAPI Server</h1>
        <p>Your Python web server is up and running.</p>
        <div class="card">
            <h2>Server Status</h2>
            <div class="status">
                <div class="dot"></div>
                <span id="status-text">Checking...</span>
            </div>
        </div>
        <br />
        <a class="api-link" href="/docs" target="_blank">View API Docs →</a>
    </div>

    <script>
        async function checkStatus() {
            try {
                const res = await fetch("/api/status");
                const data = await res.json();
                document.getElementById("status-text").textContent = data.message;
            } catch {
                document.getElementById("status-text").textContent = "Unable to reach server";
            }
        }
        checkStatus();
    </script>
</body>
</html>
